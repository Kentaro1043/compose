name: portainer
services:
  portainer-ce:
    image: portainer/portainer-ce:2.31.0@sha256:78248c888665d76c7b6e1186deaa7581752a49eb84d265153568ab472e2b441b
    container_name: portainer
    restart: unless-stopped
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data

volumes:
  data:
    name: portainer_data
